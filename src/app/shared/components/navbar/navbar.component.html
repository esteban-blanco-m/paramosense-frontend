<nav class="navbar">

  <a routerLink="/" class="nav-brand" style="text-decoration: none; color: inherit; cursor: pointer;">
    <div class="brand-icon">

      <img src="assets/images/logo-paramo.png" alt="Logo ParamoSense">
    </div>
    <div class="brand-text">
      <span class="brand-name">PARAMO</span>
      <span class="brand-sub">SENSE</span>
    </div>
  </a>

  <div class="nav-links">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">Panel de control</a>
    <a routerLink="/map" routerLinkActive="active" class="nav-link">Mapa</a>
    <a routerLink="/reports" routerLinkActive="active" class="nav-link">Reportes</a>
    <a routerLink="/system" routerLinkActive="active" class="nav-link">Estado del sistema</a>
  </div>

  <div class="nav-right">
    <div class="sync-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.2"/></svg>
      Ultima sincronización: <strong>{{ syncTime }}</strong>

    <a routerLink="/login" class="nav-link btn-login" style="margin-left: 15px; font-weight: bold; cursor: pointer;">
      Iniciar sesión
    </a>

    <div class="user-avatar">
      <img src="https://i.pravatar.cc/32?img=47" alt="Usuario" />
      <span class="user-name">{{ userName }}</span>
    </div>

  </div>
</nav>
